[build]
  publish = "."
  functions = "netlify/functions"

# 301 redirects — fix legacy/indexed URLs pointing to pages that no longer exist
# Google is indexing /backyard-movie-package and /packages/[name]/ URLs that 404.
# These redirects consolidate link equity onto the live package pages.
[[redirects]]
  from = "/backyard-movie-package"
  to = "/backyard-party-package"
  status = 301
  force = true

[[redirects]]
  from = "/packages/backyard-party/*"
  to = "/backyard-party-package"
  status = 301
  force = true

[[redirects]]
  from = "/packages/premiere-event/*"
  to = "/premiere-event-package"
  status = 301
  force = true

[[redirects]]
  from = "/packages/blockbuster-event/*"
  to = "/blockbuster-event-package"
  status = 301
  force = true

[[redirects]]
  from = "/packages/ultimate-event/*"
  to = "/ultimate-event-package"
  status = 301
  force = true

[[redirects]]
  from = "/packages/drive-in-movie/*"
  to = "/drive-in-package"
  status = 301
  force = true

[[redirects]]
  from = "/packages/indoor-event/*"
  to = "/indoor-event-package"
  status = 301
  force = true

[[redirects]]
  from = "/locations/georgia/*"
  to = "/georgia"
  status = 301
  force = true

# Blog redirects — two patterns:
# 1. /blog/slug or /blog/slug/ (WordPress-style paths Google may have indexed)
# 2. Long-form slugs that were in old canonicals but don't match the actual filename

# Pattern 1: catch-all for /blog/* → strip the /blog/ prefix
# Netlify splat redirect: :splat captures everything after /blog/
[[redirects]]
  from = "/blog/:splat"
  to = "/:splat"
  status = 301
  force = true

