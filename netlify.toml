# Blog redirects — two patterns:
# 1. /blog/slug or /blog/slug/ (WordPress-style paths Google may have indexed)
# 2. Long-form slugs that were in old canonicals but don't match the actual filename

# Pattern 1: catch-all for /blog/* → strip the /blog/ prefix
# Netlify splat redirect: :splat captures everything after /blog/
[[redirects]]
  from = "/blog/:splat"
  to = "/:splat"
  status = 301
  force = true

